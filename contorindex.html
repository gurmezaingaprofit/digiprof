<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; padding: 0; background: transparent; overflow: hidden; }
        .box {
            font-family: 'Segoe UI', sans-serif;
            text-align: center;
            padding: 18px;
            background: linear-gradient(135deg, #0b1f3a, #1a73e8);
            border-radius: 18px;
            width: 180px;
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
        }
    </style>
</head>
<body>
    <div class="box">
        <div style="font-size: 28px;">👁️</div>
        <div style="font-size: 11px; letter-spacing: 2px; opacity: 0.85; margin-bottom: 6px;">VIZITATORI UNICI</div>
        <div id="counter" style="font-size: 40px; font-weight: 700;">...</div>
    </div>

    <script>
        const scriptURL = "https://script.google.com/macros/s/AKfycbwM73hCdjvNzgcEAidadspho4NSWtPOZ0zlvvpY2EoeJBk3GD1SH9OSKknlkXOlw0wf3Q/exec";
        const storageKey = 'vizitator_confirmat';
        
        const hasVisited = localStorage.getItem(storageKey);
        const action = hasVisited ? "get" : "increment";

        fetch(`${scriptURL}?action=${action}`)
            .then(res => res.json())
            .then(data => {
                document.getElementById('counter').innerText = data.count;
                if (!hasVisited) {
                    localStorage.setItem(storageKey, 'true');
                }
            })
            .catch(() => { document.getElementById('counter').innerText = "!"; });
    </script>
</body>
</html>
